    command: ["--shardsvr", "--replSet", "shard3rs", "--bind_ip_all", "--keyFile", "/data/keyfile", "--port", "27018"]
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-Admin@123}
    volumes:
      - shard3c_data:/data/db
      - ./db/keyfile:/tmp/keyfile:ro
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --host 127.0.0.1 --port 27018 -u \"$${MONGO_ROOT_USER}\" -p \"$${MONGO_ROOT_PASSWORD}\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1 || mongosh --host 127.0.0.1 --port 27018 --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - mowndark-net
    restart: unless-stopped

  mongos:
    image: mongo:7.0
    container_name: mowndark-mongos
    hostname: mongos
    entrypoint:
      [
        "bash",
        "-lc",
        "mkdir -p /data && cp /tmp/keyfile /data/keyfile && chmod 400 /data/keyfile && chown mongodb:mongodb /data/keyfile && exec gosu mongodb mongos --configdb configrs/config1:27019,config2:27019,config3:27019 --bind_ip_all --keyFile /data/keyfile --port 27017"
      ]
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-Admin@123}
    volumes:
      - ./db/keyfile:/tmp/keyfile:ro
    ports:
      - "27017:27017"
    depends_on:
      config1:
        condition: service_healthy
      config2:
        condition: service_healthy
      config3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mongosh --host 127.0.0.1 --port 27017 -u \"$${MONGO_ROOT_USER}\" -p \"$${MONGO_ROOT_PASSWORD}\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1 || mongosh --host 127.0.0.1 --port 27017 --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - mowndark-net
    restart: unless-stopped

  mongo-init:
    image: mongo:7.0
    container_name: mowndark-mongo-init
    entrypoint: ["bash", "/scripts/init-rs.sh"]
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-Admin@123}
      MONGO_APP_USER: ${MONGO_APP_USER:-mowndark_user}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-mowndark_pass_2026}
    volumes:
      - ./scripts/init-rs.sh:/scripts/init-rs.sh:ro
    depends_on:
      config1:
        condition: service_healthy
      shard1a:
        condition: service_healthy
      shard2a:
        condition: service_healthy
      shard3a:
        condition: service_healthy
      mongos:
        condition: service_started
    networks:
      - mowndark-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mowndark-backend
    network_mode: host
    environment:
      FLASK_ENV: development
      MONGODB_URI: mongodb://${MONGO_APP_USER:-mowndark_user}:${MONGO_APP_PASSWORD:-mowndark_pass_2026}@127.0.0.1:27017/mowndark?authSource=mowndark
      MONGODB_DB_NAME: mowndark
      SECRET_KEY: ${SECRET_KEY:-mowndark-secret-key-2026}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-mowndark-jwt-secret-2026}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:latest}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ALLOW_ANONYMOUS: ${ALLOW_ANONYMOUS:-true}
      DEFAULT_PERMISSION: ${DEFAULT_PERMISSION:-editable}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      mongos:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mowndark-frontend
    environment:
      NEXT_SERVER_API_URL: ${DOCKER_NEXT_SERVER_API_URL:-http://host.docker.internal:5000/api}
      NEXT_PUBLIC_API_URL: /api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mowndark-net
    restart: unless-stopped

networks:
  mowndark-net:
    driver: bridge

volumes:
  config1_data:
  config2_data:
  config3_data:
  shard1a_data:
  shard1b_data:
  shard1c_data:
  shard2a_data:
  shard2b_data:
  shard2c_data:
  shard3a_data:
  shard3b_data:
  shard3c_data:
