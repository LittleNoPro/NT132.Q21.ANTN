services:
  config1:
    image: mongo:7.0
    container_name: mowndark-config1
    hostname: config1
    entrypoint: ["bash", "/scripts/mongo-entrypoint.sh"]
    command: ["--configsvr", "--replSet", "configrs", "--bind_ip_all", "--keyFile", "/data/keyfile", "--port", "27019"]
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-Admin@123}
      INIT_REPLICA_SET: "1"
      RS_CONFIG: '{"_id":"configrs","configsvr":true,"members":[{"_id":0,"host":"config1:27019","priority":2},{"_id":1,"host":"config2:27019","priority":1},{"_id":2,"host":"config3:27019","priority":1}]}'
    volumes:
      - config1_data:/data/db
      - ./db/keyfile:/tmp/keyfile:ro
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
    depends_on:
      - config2
      - config3
    healthcheck:
      test: ["CMD-SHELL", "mongosh --host 127.0.0.1 --port 27019 -u \"$${MONGO_ROOT_USER}\" -p \"$${MONGO_ROOT_PASSWORD}\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1 || mongosh --host 127.0.0.1 --port 27019 --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - mowndark-net
    restart: unless-stopped

